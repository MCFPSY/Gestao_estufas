; ============================================================
; PSY/MCF Painel Andon — firmware para Huidu HD-WF2 (ESP32-S3)
;
; v2.52.58 (commit 1/5) — smoke test do painel, sem WiFi ainda.
;
; COMO USAR (resumo):
;   pio run                          # compila
;   pio run -t upload                # flash via USB
;   pio device monitor               # ver logs em série
;
; Mais detalhe em README.md.
; ============================================================

[env:huidu-wf2]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_build.flash_mode = qio

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D PAINEL_FW_VERSION=\"v2.52.61\"

lib_deps =
    mrcodetastic/ESP32-HUB75-MatrixPanel-DMA@^3.0.11
    bblanchon/ArduinoJson@^7.1.0
    links2004/WebSockets@^2.4.1
